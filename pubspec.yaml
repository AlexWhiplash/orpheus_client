name: orpheus_project
description: "Secure Messaging"
publish_to: 'none'
version: 1.1.8+37

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # База данных (SQLCipher — шифрование БД на устройстве, см. AUDIT_REPORT SEC-1)
  sqflite_sqlcipher: ^3.4.0
  path: ^1.8.3

  # Криптография и безопасность
  cryptography: ^2.7.0
  crypto: ^3.0.3
  flutter_secure_storage: ^10.3.1

  # Утилиты
  rxdart: ^0.28.0
  intl: ^0.20.2
  permission_handler: ^12.0.3
  http: ^1.2.1
  shared_preferences: ^2.2.2

  # Сеть
  web_socket_channel: ^3.0.0
  connectivity_plus: ^7.2.0

  # UI и Медиа
  cupertino_icons: ^1.0.2
  audioplayers: ^6.0.0
  qr_flutter: ^4.1.0
  # QR-сканер на чистом Dart (zxing_lib) + официальный camera-плагин.
  # Заменил mobile_scanner, который тянул закрытый Google ML Kit (barcode-scanning).
  qr_code_dart_scan: ^0.11.5

  # Звонки
  flutter_webrtc: ^1.2.0

  # Фоновая работа (постоянный foreground-сервис для пушей без Google/FCM)
  flutter_background_service: ^5.0.0
  flutter_local_notifications: ^22.0.1
  
  # Нативный UI входящих звонков (как WhatsApp/Telegram)
  flutter_callkit_incoming: ^3.1.3
  uuid: ^4.3.3

  # Авторизация
  local_auth: ^3.0.1

  # Markdown для AI чата (flutter_markdown заброшен → поддерживаемый форк)
  flutter_markdown_plus: ^1.0.7

  # Инструменты
  share_plus: ^13.2.0
  package_info_plus: ^10.2.0
  device_info_plus: ^13.2.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.1
  dio: ^5.4.0
  open_filex: ^4.3.4

  # Мониторинг ошибок
  sentry_flutter: ^9.23.0

# Локальный форк flutter_callkit_incoming (база 3.1.3): удалён requestDismissKeyguard
# в accept, чтобы ответ на заблокированном телефоне не выкидывал на системный PIN.
# Обычная зависимость выше (^3.1.3) СПЕЦИАЛЬНО оставлена — тогда `flutter pub outdated`
# продолжает сообщать о новых версиях upstream. См.
# third_party/flutter_callkit_incoming/ORPHEUS_FORK.md
dependency_overrides:
  flutter_callkit_incoming:
    path: third_party/flutter_callkit_incoming

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.1
  mockito: ^5.4.4
  build_runner: ^2.4.8
  sqflite_common_ffi: ^2.3.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/
    - assets/images/

  # Inter забандлен локально (OFL), без рантайм-загрузки с серверов Google
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#000000"
  image: "assets/images/logo.png"
  android_12:
    color: "#000000"
    image: "assets/images/logo.png"
    icon_background_color: "#000000"
  fullscreen: true